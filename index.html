<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Student Performance System v3.0</title>
  <style>
    :root {
      --primary-blue: #2563eb;
      --bg-main: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); line-height: 1.5; }

    header { background: var(--card-bg); border-bottom: 1px solid #334155; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.25rem; font-weight: 600; }

    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 80px); }
    nav { background: #111827; padding: 2rem 1rem; border-right: 1px solid #1f2937; }

    .nav-btn {
      width: 100%; padding: 0.75rem 1rem; background: transparent; border: none;
      color: var(--text-muted); text-align: left; border-radius: 0.5rem; cursor: pointer;
      margin-bottom: 0.5rem; transition: 0.2s; font-size: 0.9rem; font-weight: 500;
    }
    .nav-btn.active { background: var(--primary-blue); color: white; }
    .nav-btn:hover:not(.active) { background: #1f2937; color: #fff; }

    main { padding: 2.5rem; }
    .card { background: var(--card-bg); border-radius: 0.75rem; padding: 2rem; border: 1px solid #334155; margin-bottom: 2rem; }
    h2 { margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 600; }

    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; }
    input { width: 100%; padding: 0.75rem; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 0.5rem; outline: none; transition: 0.2s; }
    input:focus { border-color: var(--primary-blue); }

    .btn { padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--primary-blue); color: white; width: 100%; margin-top: 1rem; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; padding: 1rem; border-bottom: 1px solid #334155; }
    td { padding: 1rem; border-bottom: 1px solid #1e293b; font-size: 0.85rem; }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .stat-box { background: var(--card-bg); padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
    .stat-val { font-size: 1.5rem; font-weight: 700; margin-top: 0.5rem; }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
    .bg-pass { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .bg-fail { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
  </style>
</head>
<body>

<header>
  <h1>Smart Student Performance System</h1>
  <div style="font-size: 0.8rem; color: var(--text-muted);">Weighted Assessment v3.0</div>
</header>

<div class="layout">
  <nav>
    <button class="nav-btn active" onclick="showPanel('add')">1. Add Student Data</button>
    <button class="nav-btn" onclick="showPanel('results')">2. Academic Records</button>
    <button class="nav-btn" onclick="showPanel('stats')">3. Smart Analysis</button>
    <button class="nav-btn" onclick="clearData()">4. Clear Database</button>
  </nav>

  <main>
    <div id="panel-add" class="panel">
      <h2>Enter Assessment Scores</h2>
      <div class="card" style="max-width: 500px;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="John Doe">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group"><label>Midterm (30%)</label><input type="number" id="vize" min="0" max="100"></div>
          <div class="form-group"><label>Final (50%)</label><input type="number" id="final" min="0" max="100"></div>
        </div>
        <div class="form-group">
          <label>Class Participation (20%)</label>
          <input type="number" id="katilim" min="0" max="100">
        </div>
        <button class="btn btn-primary" onclick="addStudent()">Save Performance Data</button>
      </div>
    </div>

    <div id="panel-results" class="panel" style="display:none">
      <h2>Detailed Student List</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Mid/Fin/Par</th>
              <th>Avg Score</th>
              <th>Grade</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="res-table"></tbody>
        </table>
      </div>
    </div>

    <div id="panel-stats" class="panel" style="display:none">
      <h2>Advanced Class Analysis</h2>
      <div class="grid">
        <div class="stat-box" style="border-top: 3px solid var(--primary-blue);">
          <div class="stat-label">General Class Average</div>
          <div class="stat-val" id="st-avg">0</div>
        </div>
        <div class="stat-box" style="border-top: 3px solid var(--warning);">
          <div class="stat-label">Highest Score</div>
          <div class="stat-val" id="st-high-val">0</div>
          <div style="font-size: 0.8rem; color: var(--text-muted);" id="st-high-name">-</div>
        </div>
        <div class="stat-box" style="border-top: 3px solid var(--success);">
          <div class="stat-label">Passed Students</div>
          <div class="stat-val" id="st-pass" style="color:var(--success)">0</div>
        </div>
        <div class="stat-box" style="border-top: 3px solid var(--danger);">
          <div class="stat-label">Failed Students</div>
          <div class="stat-val" id="st-fail" style="color:var(--danger)">0</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  let students = JSON.parse(localStorage.getItem('academic_data')) || [];

  function addStudent() {
    const name = document.getElementById('name').value;
    const v = parseFloat(document.getElementById('vize').value);
    const f = parseFloat(document.getElementById('final').value);
    const k = parseFloat(document.getElementById('katilim').value);

    if(!name || isNaN(v) || isNaN(f) || isNaN(k)) return alert("Lütfen tüm alanları doldurun.");

    // Ağırlıklı Ortalama Hesaplama: Vize %30, Final %50, Katılım %20
    const avg = (v * 0.3) + (f * 0.5) + (k * 0.2);
    
    let grade = 'F';
    if(avg >= 90) grade = 'A';
    else if(avg >= 80) grade = 'B';
    else if(avg >= 70) grade = 'C';
    else if(avg >= 60) grade = 'D';

    students.push({ id: Date.now(), name, v, f, k, avg, grade });
    localStorage.setItem('academic_data', JSON.stringify(students));
    
    alert("Veriler başarıyla kaydedildi.");
    document.querySelectorAll('input').forEach(i => i.value = "");
  }

  function renderResults() {
    const table = document.getElementById('res-table');
    table.innerHTML = "";
    students.forEach(s => {
      table.innerHTML += `
        <tr>
          <td style="font-weight:600">${s.name}</td>
          <td style="color:var(--text-muted)">${s.v} / ${s.f} / ${s.k}</td>
          <td style="font-weight:700">${s.avg.toFixed(1)}</td>
          <td><b>${s.grade}</b></td>
          <td><span class="badge ${s.avg >= 60 ? 'bg-pass' : 'bg-fail'}">${s.avg >= 60 ? 'PASS' : 'FAIL'}</span></td>
          <td><button onclick="deleteStudent(${s.id})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.7rem;">Delete</button></td>
        </tr>`;
    });
  }

  function updateStats() {
    if(students.length === 0) return;
    const avg = students.reduce((a, b) => a + b.avg, 0) / students.length;
    const highest = students.reduce((max, s) => s.avg > max.avg ? s : max, students[0]);
    
    document.getElementById('st-avg').innerText = avg.toFixed(1);
    document.getElementById('st-high-val').innerText = highest.avg.toFixed(1);
    document.getElementById('st-high-name').innerText = highest.name;
    document.getElementById('st-pass').innerText = students.filter(s => s.avg >= 60).length;
    document.getElementById('st-fail').innerText = students.filter(s => s.avg < 60).length;
  }

  function deleteStudent(id) {
    students = students.filter(s => s.id !== id);
    localStorage.setItem('academic_data', JSON.stringify(students));
    renderResults();
  }

  function clearData() { if(confirm("Tüm veriler silinecek?")) { students = []; localStorage.clear(); location.reload(); } }

  function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
    document.getElementById('panel-' + id).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
    if(id === 'results') renderResults();
    if(id === 'stats') updateStats();
  }
</script>
</body>
</html>
