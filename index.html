<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akademik Performans Yönetim Sistemi v2.0</title>
  <style>
    :root {
      --primary-blue: #2563eb;
      --bg-main: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); line-height: 1.5; }

    header { background: var(--card-bg); border-bottom: 1px solid #334155; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.25rem; font-weight: 600; }

    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 80px); }
    nav { background: #111827; padding: 2rem 1rem; border-right: 1px solid #1f2937; }

    .nav-btn {
      width: 100%; padding: 0.75rem 1rem; background: transparent; border: none;
      color: var(--text-muted); text-align: left; border-radius: 0.5rem; cursor: pointer;
      margin-bottom: 0.5rem; transition: 0.2s; font-size: 0.9rem; font-weight: 500;
    }
    .nav-btn.active { background: var(--primary-blue); color: white; }
    .nav-btn:hover:not(.active) { background: #1f2937; color: #fff; }

    main { padding: 2.5rem; }
    .card { background: var(--card-bg); border-radius: 0.75rem; padding: 2rem; border: 1px solid #334155; margin-bottom: 2rem; }
    h2 { margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 600; }

    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; }
    input { width: 100%; padding: 0.75rem; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 0.5rem; outline: none; }
    input:focus { border-color: var(--primary-blue); }

    .btn { padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--primary-blue); color: white; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; padding: 1rem; border-bottom: 1px solid #334155; }
    td { padding: 1rem; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--card-bg); padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; position: relative; overflow: hidden; }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
    .stat-val { font-size: 1.75rem; font-weight: 700; margin-top: 0.5rem; }
    .stat-sub { font-size: 0.85rem; margin-top: 0.25rem; opacity: 0.8; }
  </style>
</head>
<body>

<header>
  <h1>Smart Student Performance System</h1>
  <div style="font-size: 0.8rem; color: var(--text-muted);">v2.0 Stable Build</div>
</header>

<div class="layout">
  <nav>
    <button class="nav-btn active" onclick="showPanel('add')">1. Add Student</button>
    <button class="nav-btn" onclick="showPanel('results')">2. Show All Results</button>
    <button class="nav-btn" onclick="showPanel('stats')">3. Show Class Statistics</button>
    <button class="nav-btn" onclick="window.location.reload()">4. Exit (Reset)</button>
  </nav>

  <main>
    <!-- ADD STUDENT PANEL -->
    <div id="panel-add" class="panel">
      <h2>Add New Record</h2>
      <div class="card" style="max-width: 500px;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Enter student name">
        </div>
        <div class="form-group">
          <label>Score (0-100)</label>
          <input type="number" id="score" min="0" max="100" placeholder="Enter mark">
        </div>
        <button class="btn btn-primary" onclick="addStudent()">Save Record</button>
      </div>
    </div>

    <!-- RESULTS PANEL -->
    <div id="panel-results" class="panel" style="display:none">
      <h2>Academic Records</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Student Name</th>
              <th>Score</th>
              <th>Grade</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="res-table"></tbody>
        </table>
      </div>
    </div>

    <!-- STATISTICS PANEL (SMART ANALYSIS) -->
    <div id="panel-stats" class="panel" style="display:none">
      <h2>Smart Analysis Reports</h2>
      <div class="grid">
        <div class="stat-box" style="border-left: 4px solid var(--primary-blue);">
          <div class="stat-label">Class Average</div>
          <div class="stat-val" id="st-avg">0</div>
        </div>
        <div class="stat-box" style="border-left: 4px solid var(--warning);">
          <div class="stat-label">Highest Scorer</div>
          <div class="stat-val" id="st-high-val">-</div>
          <div class="stat-sub" id="st-high-name">No data</div>
        </div>
        <div class="stat-box" style="border-left: 4px solid var(--danger);">
          <div class="stat-label">Lowest Scorer</div>
          <div class="stat-val" id="st-low-val">-</div>
          <div class="stat-sub" id="st-low-name">No data</div>
        </div>
        <div class="stat-box" style="border-left: 4px solid var(--success);">
          <div class="stat-label">Pass/Fail Ratio</div>
          <div class="stat-val"><span id="st-pass" style="color:var(--success)">0</span> / <span id="st-fail" style="color:var(--danger)">0</span></div>
          <div class="stat-sub">Total Students</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  let students = JSON.parse(localStorage.getItem('students')) || [];

  function addStudent() {
    const name = document.getElementById('name').value;
    const score = parseFloat(document.getElementById('score').value);

    if(!name || isNaN(score) || score < 0 || score > 100) return alert("Please enter a valid name and score (0-100).");

    let grade = 'F';
    if(score >= 90) grade = 'A';
    else if(score >= 80) grade = 'B';
    else if(score >= 70) grade = 'C';
    else if(score >= 60) grade = 'D';

    students.push({ id: Date.now(), name, score, grade, status: score >= 60 ? 'PASS' : 'FAIL' });
    localStorage.setItem('students', JSON.stringify(students));
    
    alert("Data saved successfully!");
    document.getElementById('name').value = "";
    document.getElementById('score').value = "";
  }

  function deleteStudent(id) {
    students = students.filter(s => s.id !== id);
    localStorage.setItem('students', JSON.stringify(students));
    renderResults();
  }

  function renderResults() {
    const table = document.getElementById('res-table');
    table.innerHTML = "";
    students.forEach(s => {
      table.innerHTML += `
        <tr>
          <td style="font-weight:600">${s.name}</td>
          <td>${s.score}</td>
          <td><b>${s.grade}</b></td>
          <td style="color:${s.status === 'PASS' ? 'var(--success)' : 'var(--danger)'}; font-weight:bold">${s.status}</td>
          <td><button class="btn" style="color:var(--danger); background:transparent; border:1px solid var(--danger); padding:4px 8px; font-size:0.75rem;" onclick="deleteStudent(${s.id})">Delete</button></td>
        </tr>`;
    });
  }

  function updateStats() {
    if(students.length === 0) return;

    const avg = students.reduce((a, b) => a + b.score, 0) / students.length;
    const highest = students.reduce((max, s) => s.score > max.score ? s : max, students[0]);
    const lowest = students.reduce((min, s) => s.score < min.score ? s : min, students[0]);

    document.getElementById('st-avg').innerText = avg.toFixed(2);
    document.getElementById('st-high-val').innerText = highest.score;
    document.getElementById('st-high-name').innerText = highest.name;
    document.getElementById('st-low-val').innerText = lowest.score;
    document.getElementById('st-low-name').innerText = lowest.name;
    document.getElementById('st-pass').innerText = students.filter(s => s.status === 'PASS').length;
    document.getElementById('st-fail').innerText = students.filter(s => s.status === 'FAIL').length;
  }

  function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
    document.getElementById('panel-' + id).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    if(id === 'results') renderResults();
    if(id === 'stats') updateStats();
  }
</script>
</body>
</html>
