<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akademik Performans Yönetim Sistemi</title>
  <style>
    :root {
      --primary-blue: #2563eb;
      --bg-main: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
    }

    /* ÜST PANEL */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid #334155;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; color: #fff; }
    .status-badge { font-size: 0.75rem; background: #334155; padding: 0.25rem 0.75rem; border-radius: 99px; color: var(--text-muted); }

    /* ANA DÜZEN */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 80px);
    }

    nav {
      background: #111827;
      padding: 2rem 1rem;
      border-right: 1px solid #1f2937;
    }

    .nav-btn {
      width: 100%; padding: 0.75rem 1rem;
      background: transparent; border: none;
      color: var(--text-muted); text-align: left;
      border-radius: 0.5rem; cursor: pointer;
      margin-bottom: 0.5rem; transition: 0.2s;
      font-size: 0.9rem; font-weight: 500;
    }

    .nav-btn.active { background: var(--primary-blue); color: white; }
    .nav-btn:hover:not(.active) { background: #1f2937; color: #fff; }

    main { padding: 2.5rem; }

    /* KART VE FORM */
    .card { background: var(--card-bg); border-radius: 0.75rem; padding: 2rem; border: 1px solid #334155; }
    h2 { margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 600; }

    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; }
    input { 
      width: 100%; padding: 0.75rem; background: #0f172a; 
      border: 1px solid #334155; color: white; border-radius: 0.5rem;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--primary-blue); }

    .btn {
      padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none;
      font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-primary { background: var(--primary-blue); color: white; }
    .btn-primary:hover { background: #1d4ed8; }

    /* TABLO */
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    th { text-align: left; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; padding: 1rem; border-bottom: 1px solid #334155; }
    td { padding: 1rem; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
    
    .btn-del { color: var(--danger); background: transparent; border: 1px solid var(--danger); padding: 0.25rem 0.5rem; border-radius: 0.25rem; cursor: pointer; }
    .btn-del:hover { background: var(--danger); color: white; }

    /* İSTATİSTİK */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .stat-box { background: var(--card-bg); padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; }
    .stat-val { font-size: 2rem; font-weight: 700; margin-top: 0.5rem; }
  </style>
</head>
<body>

<header>
  <h1>Akademik Performans Yönetim Paneli</h1>
  <div class="status-badge">Sistem Aktif</div>
</header>

<div class="layout">
  <nav>
    <button class="nav-btn active" onclick="showPanel('add')">Veri Girişi</button>
    <button class="nav-btn" onclick="showPanel('results')">Öğrenci Listesi</button>
    <button class="nav-btn" onclick="showPanel('stats')">Analiz Raporu</button>
  </nav>

  <main>
    <div id="panel-add" class="panel">
      <h2>Öğrenci Kayıt Formu</h2>
      <div class="card" style="max-width: 600px;">
        <div class="form-group">
          <label>Öğrenci Adı Soyadı</label>
          <input type="text" id="name" placeholder="Tam adını giriniz">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
          <div class="form-group"><label>Ders 1</label><input type="number" id="s1" min="0" max="100"></div>
          <div class="form-group"><label>Ders 2</label><input type="number" id="s2" min="0" max="100"></div>
          <div class="form-group"><label>Ders 3</label><input type="number" id="s3" min="0" max="100"></div>
        </div>
        <button class="btn btn-primary" onclick="addStudent()">Sisteme Aktar</button>
      </div>
    </div>

    <div id="panel-results" class="panel" style="display:none">
      <h2>Kayıtlı Öğrenci Listesi</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Öğrenci</th>
              <th>Ortalama</th>
              <th>Harf Notu</th>
              <th>Durum</th>
              <th>İşlemler</th>
            </tr>
          </thead>
          <tbody id="res-table"></tbody>
        </table>
      </div>
    </div>

    <div id="panel-stats" class="panel" style="display:none">
      <h2>Sınıf İstatistik Analizi</h2>
      <div class="grid">
        <div class="stat-box"><label>Genel Ortalama</label><div class="stat-val" id="st-avg">0</div></div>
        <div class="stat-box"><label>Başarılı</label><div class="stat-val" id="st-pass" style="color:var(--success)">0</div></div>
        <div class="stat-box"><label>Başarısız</label><div class="stat-val" id="st-fail" style="color:var(--danger)">0</div></div>
      </div>
    </div>
  </main>
</div>

<script>
  let students = [];

  function addStudent() {
    const name = document.getElementById('name').value;
    const s1 = parseFloat(document.getElementById('s1').value);
    const s2 = parseFloat(document.getElementById('s2').value);
    const s3 = parseFloat(document.getElementById('s3').value);

    if(!name || isNaN(s1) || isNaN(s2) || isNaN(s3)) return alert("Tüm akademik verileri eksiksiz giriniz.");

    const avg = (s1 + s2 + s3) / 3;
    let grade = 'F';
    if(avg >= 90) grade = 'A';
    else if(avg >= 80) grade = 'B';
    else if(avg >= 70) grade = 'C';
    else if(avg >= 60) grade = 'D';

    students.push({ id: Date.now(), name, avg, grade });
    alert("Kayıt başarıyla oluşturuldu.");
    document.querySelectorAll('input').forEach(i => i.value = "");
  }

  function deleteStudent(id) {
    students = students.filter(s => s.id !== id);
    renderResults();
  }

  function renderResults() {
    const table = document.getElementById('res-table');
    table.innerHTML = "";
    students.forEach(s => {
      table.innerHTML += `
        <tr>
          <td style="font-weight:600">${s.name}</td>
          <td>${s.avg.toFixed(2)}</td>
          <td><b>${s.grade}</b></td>
          <td style="color:${s.avg >= 60 ? 'var(--success)' : 'var(--danger)'}">${s.avg >= 60 ? 'BAŞARILI' : 'BAŞARISIZ'}</td>
          <td><button class="btn-del" onclick="deleteStudent(${s.id})">Kayıdı Sil</button></td>
        </tr>`;
    });
  }

  function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
    document.getElementById('panel-' + id).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if(id === 'results') renderResults();
    if(id === 'stats') updateStats();
  }

  function updateStats() {
    const avg = students.length ? students.reduce((a, b) => a + b.avg, 0) / students.length : 0;
    document.getElementById('st-avg').innerText = avg.toFixed(2);
    document.getElementById('st-pass').innerText = students.filter(s => s.avg >= 60).length;
    document.getElementById('st-fail').innerText = students.filter(s => s.avg < 60).length;
  }
</script>
</body>
</html>
